# Agent Harness Deploy runtime hooks for Kimi Code CLI
# Auto-generated by Agent Harness Deploy.
# Kimi Code reads hooks from [[hooks]] array in ~/.kimi-code/config.toml.
# This template is appended to config.toml ??merge manually if needed.

[[hooks]]
event = "PreToolUse"
matcher = "Bash"
command = "python .kimi-code/hooks/pre_tool_use.py"
timeout = 5

[[hooks]]
event = "PostToolUse"
matcher = ".*"
command = "python .kimi-code/hooks/post_tool_use.py"
timeout = 5

[[hooks]]
event = "Stop"
command = "python .kimi-code/hooks/stop.py"
timeout = 10
