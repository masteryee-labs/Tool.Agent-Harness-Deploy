# Agent Harness Deploy runtime hooks for OpenCode.
# REQUIRES third-party plugin "opencode-yaml-hooks" (https://github.com/KristjanPikhof/OpenCode-Hooks).
# OpenCode natively uses JS/TS plugins (see https://dev.opencode.ai/docs/plugins/).
# To enable YAML hooks, add "opencode-yaml-hooks" to your plugin list in opencode.json:
#   { "plugin": ["opencode-yaml-hooks"] }
# Then this file at .opencode/hook/hooks.yaml will be loaded by the plugin.
# Event names use the tool.before.* / tool.after.* / session.* wildcard syntax.

hooks:
  - id: ahd-pre-tool-use
    event: tool.before.*
    actions:
      - command: "python .opencode/hooks/pre_tool_use.py"
  - id: ahd-post-tool-use
    event: tool.after.*
    actions:
      - command: "python .opencode/hooks/post_tool_use.py"
  - id: ahd-stop
    event: session.idle
    actions:
      - command: "python .opencode/hooks/stop.py"
